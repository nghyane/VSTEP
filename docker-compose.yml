services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vstep
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vstep"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5



  backend:
    build: ./apps/backend
    command: sh -c "bunx --bun drizzle-kit push --force && bun run seed/index.ts && bun run src/index.ts"
    ports:
      - "4000:4000"
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/vstep
      REDIS_URL: redis://redis:6379
    develop:
      watch:
        - action: sync
          path: ./apps/backend/src
          target: /app/src
        - action: rebuild
          path: ./apps/backend/package.json

  grading:
    build: ./apps/grading
    ports:
      - "8000:8000"
    env_file: ./apps/grading/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/grading/app
          target: /app/app
        - action: rebuild
          path: ./apps/grading/requirements.txt
volumes:
  pgdata:
  redisdata:
