services:
  traefik:
    image: traefik:v2.11
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=traefik
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@vstepgo.com}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - default
      - traefik
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vstep
    command: >
      postgres
        -c shared_buffers=256MB
        -c work_mem=16MB
        -c effective_cache_size=768MB
        -c maintenance_work_mem=128MB
        -c max_connections=30
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vstep"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # Laravel API
  backend:
    image: ghcr.io/${IMAGE_OWNER:-nghyane}/vstep-backend:${BACKEND_IMAGE_TAG:-main}
    pull_policy: always
    env_file:
      - ./apps/backend-v2/.env
    command: php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --workers=auto --max-requests=500
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${DOMAIN:-api.vstepgo.com}`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.service=backend
      - traefik.http.routers.backend-secure.rule=Host(`${DOMAIN:-api.vstepgo.com}`)
      - traefik.http.routers.backend-secure.entrypoints=websecure
      - traefik.http.routers.backend-secure.tls=true
      - traefik.http.routers.backend-secure.tls.certresolver=le
      - traefik.http.routers.backend-secure.service=backend
      - traefik.http.services.backend.loadbalancer.server.port=8000
    environment:
      APP_NAME: VSTEP
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN:-api.vstepgo.com}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: vstep
      DB_USERNAME: user
      DB_PASSWORD: password
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-644444548899-q6kldv6576f2gjoccrm3i3s9sqlbetce.apps.googleusercontent.com}
      FILESYSTEM_DISK: s3
      AWS_DEFAULT_REGION: auto
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      LANGUAGETOOL_URL: http://languagetool:8010
      CORS_ALLOWED_ORIGINS: "*"
    networks:
      - default
      - traefik
    depends_on:
      traefik:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Frontend SPA — image built in CI (ghcr.io), VPS only pulls
  frontend:
    image: ghcr.io/${IMAGE_OWNER:-nghyane}/vstep-frontend:${FRONTEND_IMAGE_TAG:-main}
    pull_policy: always
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN:-vstepgo.com}`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.routers.frontend.service=frontend
      - traefik.http.routers.frontend-secure.rule=Host(`${FRONTEND_DOMAIN:-vstepgo.com}`)
      - traefik.http.routers.frontend-secure.entrypoints=websecure
      - traefik.http.routers.frontend-secure.tls=true
      - traefik.http.routers.frontend-secure.tls.certresolver=le
      - traefik.http.routers.frontend-secure.service=frontend
      - traefik.http.services.frontend.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "test -f /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - default
      - traefik
    restart: unless-stopped

  # Admin SPA — image built in CI (ghcr.io), VPS only pulls
  admin:
    image: ghcr.io/${IMAGE_OWNER:-nghyane}/vstep-admin:${ADMIN_IMAGE_TAG:-main}
    pull_policy: always
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.http.routers.admin.rule=Host(`${ADMIN_DOMAIN:-admin.vstepgo.com}`)
      - traefik.http.routers.admin.entrypoints=web
      - traefik.http.routers.admin.service=admin
      - traefik.http.routers.admin-secure.rule=Host(`${ADMIN_DOMAIN:-admin.vstepgo.com}`)
      - traefik.http.routers.admin-secure.entrypoints=websecure
      - traefik.http.routers.admin-secure.tls=true
      - traefik.http.routers.admin-secure.tls.certresolver=le
      - traefik.http.routers.admin-secure.service=admin
      - traefik.http.services.admin.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "test -f /usr/share/nginx/html/index.html"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - default
      - traefik
    restart: unless-stopped

  # Laravel Horizon — queue dashboard + worker management
  horizon:
    image: ghcr.io/${IMAGE_OWNER:-nghyane}/vstep-backend:${BACKEND_IMAGE_TAG:-main}
    pull_policy: always
    env_file:
      - ./apps/backend-v2/.env
    command: php artisan horizon
    environment:
      APP_NAME: VSTEP
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN:-api.vstepgo.com}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: vstep
      DB_USERNAME: user
      DB_PASSWORD: password
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-644444548899-q6kldv6576f2gjoccrm3i3s9sqlbetce.apps.googleusercontent.com}
      FILESYSTEM_DISK: s3
      AWS_DEFAULT_REGION: auto
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      LANGUAGETOOL_URL: http://languagetool:8010
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # LanguageTool — grammar checker (rule-based, deterministic)
  languagetool:
    image: erikvl87/languagetool:latest
    ports:
      - "8081:8010"
    environment:
      Java_Xms: 512m
      Java_Xmx: 1536m
    deploy:
      resources:
        limits:
          memory: 2048M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NLP Sidecar — GECToR + CEFR Classifier (optional, phase 2)
  # Uncomment when models downloaded and accuracy verified.
  # nlp-sidecar:
  #   build: ./apps/_deprecated/nlp-sidecar
  #   ports:
  #     - "8082:8000"
  #   environment:
  #     MODELS_DIR: /app/models
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  backend_vendor:

networks:
  traefik:
    external: true
