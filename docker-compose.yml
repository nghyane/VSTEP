services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vstep
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vstep"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Laravel API — serves on :3000 for FE
  backend:
    build: ./apps/backend-v2
    command: >
      sh -c "
        php artisan key:generate --force --no-interaction &&
        php artisan migrate --force &&
        php artisan db:seed --force --no-interaction &&
        php artisan storage:link 2>/dev/null;
        php artisan serve --host=0.0.0.0 --port=8000
      "
    ports:
      - "3000:8000"
    environment:
      APP_NAME: VSTEP
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:3000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: vstep
      DB_USERNAME: user
      DB_PASSWORD: password
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: vstep-dev-jwt-secret-change-in-production
      GRADING_SERVICE_URL: http://grading:8000
      CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - uploads:/app/storage/app/public
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      grading:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./apps/backend-v2/app
          target: /app/app
        - action: sync
          path: ./apps/backend-v2/routes
          target: /app/routes
        - action: sync
          path: ./apps/backend-v2/database
          target: /app/database
        - action: rebuild
          path: ./apps/backend-v2/composer.json

  # Grading results consumer — processes AI grading results
  grading-consumer:
    build: ./apps/backend-v2
    command: php artisan grading:consume
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: vstep
      DB_USERNAME: user
      DB_PASSWORD: password
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: vstep-dev-jwt-secret-change-in-production
    depends_on:
      - backend
    restart: unless-stopped

  # AI grading microservice
  grading:
    build: ./apps/grading
    ports:
      - "8001:8000"
    env_file: ./apps/grading/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/grading/app
          target: /app/app
        - action: rebuild
          path: ./apps/grading/requirements.txt

volumes:
  pgdata:
  redisdata:
  uploads:
