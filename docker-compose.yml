services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vstep
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vstep"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Laravel API — serves on :3000 for FE
  backend:
    build: ./apps/backend-v2
    env_file:
      - ./apps/backend-v2/.env
    command: >
      sh -c "
        php artisan key:generate --force --no-interaction &&
        php artisan migrate --force &&
        php artisan db:seed --force --no-interaction &&
        php artisan storage:link 2>/dev/null;
        php artisan serve --host=0.0.0.0 --port=8000
      "
    ports:
      - "3000:8000"
    environment:
      APP_NAME: VSTEP
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:3000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: vstep
      DB_USERNAME: user
      DB_PASSWORD: password
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: vstep-dev-jwt-secret-change-in-production
      FILESYSTEM_DISK: s3
      AWS_ENDPOINT: ${S3_ENDPOINT}
      AWS_BUCKET: ${S3_BUCKET:-vstep}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_DEFAULT_REGION: auto
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/backend-v2/app
          target: /app/app
        - action: sync
          path: ./apps/backend-v2/routes
          target: /app/routes
        - action: sync
          path: ./apps/backend-v2/database
          target: /app/database
        - action: rebuild
          path: ./apps/backend-v2/composer.json

  # Laravel Horizon — queue dashboard + worker management
  horizon:
    build: ./apps/backend-v2
    env_file:
      - ./apps/backend-v2/.env
    command: php artisan horizon
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: vstep
      DB_USERNAME: user
      DB_PASSWORD: password
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: vstep-dev-jwt-secret-change-in-production
    depends_on:
      - backend
    restart: unless-stopped

  # LanguageTool — grammar checker (rule-based, deterministic)
  languagetool:
    image: erikvl87/languagetool:latest
    ports:
      - "8081:8010"
    environment:
      langtool_languageModel: ""
      Java_Xms: 256m
      Java_Xmx: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v2/languages"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NLP Sidecar — GECToR + CEFR Classifier (optional, phase 2)
  # Uncomment when models downloaded and accuracy verified.
  # nlp-sidecar:
  #   build: ./apps/nlp-sidecar
  #   ports:
  #     - "8082:8000"
  #   environment:
  #     MODELS_DIR: /app/models
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

volumes:
  pgdata:
  redisdata:
