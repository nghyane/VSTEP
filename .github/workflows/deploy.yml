name: Deploy Backend to Production

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend-v2/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Frontend/admin SPA deployments live in build-images.yml — they build the
# image on the Actions runner and the VPS only pulls. Building Vite on the
# small VPS used to OOM and freeze SSH; keep heavy builds in CI.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 5.223.87.142
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/vstep

            # Preserve host-managed secrets (.env is gitignored but pull may
            # touch the working tree). Backup → pull → restore is paranoid
            # but cheap.
            [ -f apps/backend-v2/.env ] && cp apps/backend-v2/.env apps/backend-v2/.env.deploy-backup

            git pull origin main

            if [ -f apps/backend-v2/.env.deploy-backup ]; then
              cp apps/backend-v2/.env.deploy-backup apps/backend-v2/.env
              rm apps/backend-v2/.env.deploy-backup
            fi

            set_backend_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" apps/backend-v2/.env; then
                sed -i "s|^${key}=.*|${key}=${value}|" apps/backend-v2/.env
              else
                printf '\n%s=%s\n' "$key" "$value" >> apps/backend-v2/.env
              fi
            }

            # Non-secret production object-storage settings. Access keys stay
            # host-managed in apps/backend-v2/.env and are validated below.
            set_backend_env FILESYSTEM_DISK s3
            set_backend_env AWS_DEFAULT_REGION auto
            set_backend_env AWS_BUCKET vstep
            set_backend_env AWS_URL https://pub-2c7bac3350414b75b3766a5a511dc672.r2.dev
            set_backend_env AWS_ENDPOINT https://11a58966d1289d0387eebba638a19cc3.r2.cloudflarestorage.com
            set_backend_env AWS_USE_PATH_STYLE_ENDPOINT true

            missing=""
            for key in \
              APP_KEY JWT_SECRET \
              AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_BUCKET AWS_ENDPOINT AWS_URL \
              AZURE_SPEECH_KEY AZURE_SPEECH_REGION \
              BIFROST_URL BIFROST_API_KEY \
              PAYOS_CLIENT_ID PAYOS_API_KEY PAYOS_CHECKSUM_KEY
            do
              if ! grep -Eq "^${key}=.+" apps/backend-v2/.env; then
                missing="$missing $key"
              fi
            done

            if [ -n "$missing" ]; then
              echo "Missing required backend env:$missing" >&2
              exit 1
            fi

            # Rebuild + recreate only application containers (backend, horizon).
            # Infrastructure (postgres, redis) stays running → zero-downtime check.
            # Forcing postgres/redis would cause ~30s window where rate limiter
            # and DB queries fail → 500 on every request.
            docker compose -f docker-compose.yml --env-file .env up -d --build --force-recreate --remove-orphans backend horizon
            docker compose -f docker-compose.yml --env-file .env up -d --remove-orphans

            docker image prune -f
