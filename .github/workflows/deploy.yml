name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 5.223.87.142
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/vstep

            # Backup .env trước khi pull — git checkout -- . sẽ không xóa
            # file untracked nhưng pull có thể conflict nếu .env bị track
            # Backup phòng trường hợp .env bị overwrite bởi example file
            [ -f apps/backend-v2/.env ] && cp apps/backend-v2/.env apps/backend-v2/.env.deploy-backup

            git pull origin main

            # Restore .env nếu bị overwrite
            if [ -f apps/backend-v2/.env.deploy-backup ]; then
              cp apps/backend-v2/.env.deploy-backup apps/backend-v2/.env
              rm apps/backend-v2/.env.deploy-backup
            fi

            # Rebuild frontend if its files OR build args (docker-compose.yml) changed
            if git diff HEAD~1 --name-only | grep -qE '^(apps/frontend-v3/|docker-compose\.yml$)'; then
              docker compose --env-file .env build frontend
            fi

            # Rebuild admin if its files OR build args changed
            if git diff HEAD~1 --name-only | grep -qE '^(apps/admin/|docker-compose\.yml$)'; then
              docker compose --env-file .env build admin
            fi

            # Always rebuild + recreate backend/horizon (code changes)
            docker compose --env-file .env up -d --build --force-recreate backend horizon

            # Recreate frontend/admin only if they were rebuilt
            if git diff HEAD~1 --name-only | grep -qE '^(apps/frontend-v3/|docker-compose\.yml$)'; then
              docker compose --env-file .env up -d --force-recreate frontend
            fi

            if git diff HEAD~1 --name-only | grep -qE '^(apps/admin/|docker-compose\.yml$)'; then
              docker compose --env-file .env up -d --force-recreate admin
            fi

            # Cleanup old images
            docker image prune -f
