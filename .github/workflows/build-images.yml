name: Build SPA Images

on:
  push:
    branches: [main]
    paths:
      - 'apps/frontend-v3/**'
      - 'apps/admin/**'
      - 'docker-compose.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: frontend
            context: ./apps/frontend-v3
            image: vstep-frontend
            args: |
              VITE_API_URL=https://api.vstepgo.com/api/v1
              VITE_GOOGLE_CLIENT_ID=644444548899-q6kldv6576f2gjoccrm3i3s9sqlbetce.apps.googleusercontent.com
          - app: admin
            context: ./apps/admin
            image: vstep-admin
            args: |
              VITE_API_URL=https://api.vstepgo.com/api/v1
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          tags: |
            type=raw,value=main
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.args }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull + recreate SPAs on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 5.223.87.142
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/vstep
            git pull origin main
            docker compose -f docker-compose.yml --env-file .env pull frontend admin
            docker compose -f docker-compose.yml --env-file .env up -d --no-build frontend admin
            docker image prune -f
