# Local dev override — auto-loaded by `docker compose up`.
# Production deploy: use `docker compose -f docker-compose.yml up` to skip this file.
#
# Secrets (APP_KEY, JWT_SECRET, ...) live in apps/backend-v2/.env (gitignored),
# loaded via `env_file` declared in the base compose file.

services:
  frontend:
    image: vstep-frontend:local
    pull_policy: never
    build:
      context: ./apps/frontend-v3
      args:
        VITE_API_URL: http://localhost:8000/api/v1
        VITE_GOOGLE_CLIENT_ID: 644444548899-q6kldv6576f2gjoccrm3i3s9sqlbetce.apps.googleusercontent.com

  backend:
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
    # Extends base command with demo data seeders + dev composer install.
    # Compose has no "append command" syntax, so we duplicate the base sequence.
    command: >
      sh -c "
        composer install --optimize-autoloader --quiet &&
        php artisan migrate --force &&
        php artisan db:seed --force --no-interaction &&
        php artisan demo:streak learner@vstep.test 12 &&
        php artisan storage:link 2>/dev/null;
        php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --workers=auto --max-requests=500
      "

  horizon:
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
