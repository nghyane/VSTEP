  <rect x="156.349" y="708" width="121.93" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="162.349" y="717" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">alt [High confidence]</text>
  <line x1="156.349" y1="776" x2="414.025" y2="776" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
  <text x="164.349" y="790" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">[Medium/low confidence]</text>
</g>
<line class="lifeline" data-actor="C" x1="70" y1="70" x2="70" y2="972" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
