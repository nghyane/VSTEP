<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 459.899 776" width="459.899" height="776" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e;background:var(--bg)">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<g class="block" data-type="alt" data-label="Already claimed">
  <rect x="30" y="278" width="249.52499999999998" height="60" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="30" y="278" width="121.93" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="36" y="287" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">alt [Already claimed]</text>
</g>
<g class="block" data-type="alt" data-label="Score diff &gt; 0.5">
  <rect x="172.223" y="546" width="257.676" height="60" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="172.223" y="546" width="114.01000000000002" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="178.223" y="555" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">alt [Score diff &gt; 0.5]</text>
</g>
<line class="lifeline" data-actor="I" x1="85.874" y1="70" x2="85.874" y2="746" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="B" x1="225.874" y1="70" x2="225.874" y2="746" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="DB" x1="365.874" y1="70" x2="365.874" y2="746" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="I" data-to="B" data-label="GET /api/submissions/queue" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.874" y1="90" x2="225.874" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="155.874" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">GET /api/submissions/queue</text>
</g>
<g class="message" data-from="B" data-to="DB" data-label="Fetch review_pending" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="130" x2="365.874" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.874" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Fetch review_pending</text>
</g>
<g class="message" data-from="B" data-to="I" data-label="Paginated queue" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="170" x2="85.874" y2="170" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="155.874" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Paginated queue</text>
</g>
<g class="message" data-from="I" data-to="B" data-label="POST /submissions/:id/claim" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.874" y1="210" x2="225.874" y2="210" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="155.874" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">POST /submissions/:id/claim</text>
</g>
<g class="message" data-from="B" data-to="DB" data-label="Atomic claim update" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="250" x2="365.874" y2="250" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.874" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Atomic claim update</text>
</g>
<g class="message" data-from="B" data-to="I" data-label="409 Conflict" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="318" x2="85.874" y2="318" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="155.874" y="308" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">409 Conflict</text>
</g>
<g class="message" data-from="B" data-to="DB" data-label="Fetch submission + AI result" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="358" x2="365.874" y2="358" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.874" y="348" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Fetch submission + AI result</text>
</g>
<g class="message" data-from="B" data-to="I" data-label="Submission with AI result" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="398" x2="85.874" y2="398" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="155.874" y="388" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Submission with AI result</text>
</g>
<g class="message" data-from="I" data-to="B" data-label="PUT /submissions/:id/review" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="85.874" y1="438" x2="225.874" y2="438" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="155.874" y="428" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">PUT /submissions/:id/review</text>
</g>
<g class="message" data-from="B" data-to="DB" data-label="Set status=completed" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="478" x2="365.874" y2="478" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.874" y="468" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Set status=completed</text>
</g>
<g class="message" data-from="B" data-to="DB" data-label="Store human result" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="518" x2="365.874" y2="518" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.874" y="508" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Store human result</text>
</g>
<g class="message" data-from="B" data-to="DB" data-label="Set audit flag" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="586" x2="365.874" y2="586" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.874" y="576" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Set audit flag</text>
</g>
<g class="message" data-from="B" data-to="DB" data-label="Record skill score" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="626" x2="365.874" y2="626" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.874" y="616" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Record skill score</text>
</g>
<g class="message" data-from="B" data-to="DB" data-label="Update progress" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="666" x2="365.874" y2="666" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="295.874" y="656" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Update progress</text>
</g>
<g class="message" data-from="B" data-to="I" data-label="Final scores" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="225.874" y1="706" x2="85.874" y2="706" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="155.874" y="696" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">Final scores</text>
</g>
<g class="actor" data-id="I" data-label="Instructor" data-type="participant">
  <rect x="40" y="30" width="91.74799999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="85.874" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Instructor</text>
</g>
<g class="actor" data-id="B" data-label="Backend" data-type="participant">
  <rect x="182.223" y="30" width="87.30199999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="225.874" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Backend</text>
</g>
<g class="actor" data-id="DB" data-label="PostgreSQL" data-type="participant">
  <rect x="311.84900000000005" y="30" width="108.04999999999998" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="365.874" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">PostgreSQL</text>
</g>
</svg>