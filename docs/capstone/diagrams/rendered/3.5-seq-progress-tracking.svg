  <text x="176.00350000000003" y="647" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">alt [high deviation]</text>
  <line x1="170.00350000000003" y1="744" x2="277.3055" y2="744" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
</g>
