<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 960" width="100%" height="100%" style="background-color: #ffffff;">
  <style>
    @font-face { font-family: 'Comic Shanns'; src: url('https://excalidraw.nyc3.cdn.digitaloceanspaces.com/oss/fonts/ComicShanns/ComicShanns-Regular-279a7b317d12eb88de06167bd672b4b4.woff2') format('woff2'); }
    text { font-family: 'Comic Shanns', cursive; }
  </style>
  <defs>
    <marker id="a-sync" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#404040"/>
    </marker>
    <marker id="a-async" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
  </defs>

  <!-- ================================================================ -->
  <!--  FRONTEND                                                        -->
  <!-- ================================================================ -->
  <rect x="280" y="30" width="640" height="100" rx="6" fill="#fafafa" stroke="#404040" stroke-width="2"/>
  <text x="300" y="57" font-weight="700" font-size="15" fill="#262626">Web Application</text>
  <text x="300" y="75" font-size="11" font-weight="500" fill="#737373">[apps/frontend · React 19, Vite 7, TypeScript]</text>

  <rect x="510" y="88" width="90" height="26" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
  <text x="555" y="106" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">Pages</text>
  <rect x="608" y="88" width="120" height="26" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
  <text x="668" y="106" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">Components</text>
  <rect x="736" y="88" width="70" height="26" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
  <text x="771" y="106" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">Hooks</text>
  <rect x="814" y="88" width="85" height="26" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
  <text x="856" y="106" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">API Client</text>

  <!-- ================================================================ -->
  <!--  ❶ FRONTEND → BACKEND                                            -->
  <!-- ================================================================ -->
  <path d="M 570 130 L 570 160" fill="none" stroke="#404040" stroke-width="1.8"/>
  <text x="570" y="177" font-size="11" font-weight="600" fill="#404040" text-anchor="middle">❶  HTTP REST / JSON</text>
  <path d="M 570 185 L 570 210" fill="none" stroke="#404040" stroke-width="1.8" marker-end="url(#a-sync)"/>

  <!-- ================================================================ -->
  <!--  BACKEND CONTAINER                                               -->
  <!-- ================================================================ -->
  <rect x="80" y="220" width="720" height="330" rx="6" fill="#fafafa" stroke="#404040" stroke-width="2"/>
  <text x="100" y="248" font-weight="700" font-size="15" fill="#262626">API Server</text>
  <text x="100" y="266" font-size="11" font-weight="500" fill="#737373">[apps/backend · Bun, Elysia, TypeScript]</text>

  <!-- Layer 1: Routing & Middleware -->
  <rect x="100" y="280" width="680" height="50" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1.2"/>
  <text x="115" y="300" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.5">ROUTING &amp; MIDDLEWARE</text>
  <text x="115" y="318" font-size="12" font-weight="600" fill="#262626">app.ts</text>
  <circle cx="162" cy="314" r="2.5" fill="#a3a3a3"/>
  <text x="172" y="318" font-size="12" font-weight="500" fill="#525252">src/plugins — JWT Auth, Error Handler</text>

  <!-- Layer 2: Domain Modules -->
  <rect x="100" y="340" width="680" height="105" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1.2"/>
  <text x="115" y="362" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.5">DOMAIN MODULES</text>
  <text x="281" y="362" font-size="10" font-weight="400" fill="#a3a3a3">(src/modules)</text>

  <!-- Row 1 -->
  <rect x="115" y="375" width="60" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="145" y="393" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">auth</text>
  <rect x="183" y="375" width="62" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="214" y="393" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">users</text>
  <rect x="253" y="375" width="85" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="295" y="393" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">questions</text>
  <rect x="346" y="375" width="62" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="377" y="393" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">exams</text>
  <rect x="416" y="375" width="100" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="466" y="393" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">submissions</text>
  <rect x="524" y="375" width="70" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="559" y="393" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">classes</text>
  <rect x="602" y="375" width="100" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="652" y="393" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">notifications</text>

  <!-- Row 2 -->
  <rect x="115" y="409" width="78" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="154" y="427" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">progress</text>
  <rect x="201" y="409" width="74" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="238" y="427" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">practice</text>
  <rect x="283" y="409" width="88" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="327" y="427" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">vocabulary</text>
  <rect x="379" y="409" width="92" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="425" y="427" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">onboarding</text>
  <rect x="479" y="409" width="72" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="515" y="427" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">uploads</text>
  <rect x="559" y="409" width="62" height="26" rx="13" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="590" y="427" font-size="11" font-weight="500" fill="#262626" text-anchor="middle">health</text>

  <!-- Layer 3: Data Access + Shared Utils -->
  <rect x="100" y="460" width="330" height="70" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1.2"/>
  <text x="115" y="482" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.5">DATA ACCESS</text>
  <text x="210" y="482" font-size="10" font-weight="400" fill="#a3a3a3">(src/db)</text>
  <text x="115" y="500" font-size="12" font-weight="600" fill="#262626">Drizzle ORM</text>
  <text x="115" y="518" font-size="11" font-weight="400" fill="#737373">Schema definitions · Migrations</text>

  <rect x="450" y="460" width="330" height="70" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1.2"/>
  <text x="465" y="482" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.5">SHARED UTILS</text>
  <text x="579" y="482" font-size="10" font-weight="400" fill="#a3a3a3">(src/common)</text>
  <text x="465" y="500" font-size="12" font-weight="500" fill="#525252">Error types · Helpers · Constants</text>

  <!-- ================================================================ -->
  <!--  DATABASE (Cylinder) — right side                                -->
  <!-- ================================================================ -->
  <path d="M 920 380 L 920 470 A 90 22 0 0 0 1100 470 L 1100 380 Z" fill="#f5f5f5" stroke="#404040" stroke-width="1.8"/>
  <ellipse cx="1010" cy="380" rx="90" ry="22" fill="#fafafa" stroke="#404040" stroke-width="1.8"/>
  <text x="1010" y="425" font-size="14" font-weight="700" fill="#262626" text-anchor="middle">PostgreSQL</text>
  <text x="1010" y="445" font-size="11" font-weight="400" fill="#737373" text-anchor="middle">[Primary Database]</text>

  <!-- ❷ Backend → DB (horizontal straight) -->
  <path d="M 800 425 L 915 425" fill="none" stroke="#404040" stroke-width="1.8" marker-end="url(#a-sync)"/>
  <text x="855" y="414" font-size="11" font-weight="600" fill="#404040" text-anchor="middle">❷  SQL via ORM</text>

  <!-- ================================================================ -->
  <!--  ❸ BACKEND → REDIS (Publish)                                     -->
  <!-- ================================================================ -->
  <path d="M 440 550 L 440 565" fill="none" stroke="#b91c1c" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="440" y="582" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">❸  Publish Task</text>
  <path d="M 440 590 L 440 610" fill="none" stroke="#b91c1c" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a-async)"/>

  <!-- ================================================================ -->
  <!--  MESSAGE BROKER (Pill) — centered                                -->
  <!-- ================================================================ -->
  <rect x="310" y="610" width="260" height="70" rx="35" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.8"/>
  <text x="440" y="642" font-weight="700" font-size="14" fill="#262626" text-anchor="middle">Message Broker</text>
  <text x="440" y="662" font-size="11" font-weight="500" fill="#737373" text-anchor="middle">[Redis Streams]</text>

  <!-- ================================================================ -->
  <!--  ❹ REDIS → GRADING (Consume)                                     -->
  <!-- ================================================================ -->
  <path d="M 440 680 L 440 695" fill="none" stroke="#b91c1c" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="440" y="712" font-size="11" font-weight="600" fill="#b91c1c" text-anchor="middle">❹  Consume Task</text>
  <path d="M 440 720 L 440 740" fill="none" stroke="#b91c1c" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a-async)"/>

  <!-- ================================================================ -->
  <!--  GRADING WORKER — below Redis                                    -->
  <!-- ================================================================ -->
  <rect x="160" y="740" width="660" height="195" rx="6" fill="#fafafa" stroke="#404040" stroke-width="2"/>
  <text x="180" y="768" font-weight="700" font-size="15" fill="#262626">Grading Worker</text>
  <text x="180" y="786" font-size="11" font-weight="500" fill="#737373">[apps/grading · Python, FastAPI]</text>

  <!-- Entry -->
  <rect x="180" y="800" width="620" height="36" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1.2"/>
  <text x="490" y="823" font-size="13" font-weight="600" fill="#262626" text-anchor="middle">worker.py</text>

  <!-- Core Logic -->
  <rect x="180" y="845" width="380" height="36" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1.2"/>
  <text x="195" y="868" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.5">CORE</text>
  <rect x="235" y="851" width="100" height="24" rx="4" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="285" y="868" font-size="10" font-weight="500" fill="#262626" text-anchor="middle">Writing Pipeline</text>
  <rect x="343" y="851" width="100" height="24" rx="4" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="393" y="868" font-size="10" font-weight="500" fill="#262626" text-anchor="middle">Speaking Pipeline</text>
  <rect x="451" y="851" width="100" height="24" rx="4" fill="#f5f5f5" stroke="#e5e5e5"/>
  <text x="501" y="868" font-size="10" font-weight="500" fill="#262626" text-anchor="middle">Prompt Templates</text>

  <!-- Support -->
  <rect x="575" y="845" width="225" height="36" rx="4" fill="#ffffff" stroke="#d4d4d4" stroke-width="1.2"/>
  <text x="590" y="868" font-size="10" font-weight="700" fill="#525252" letter-spacing="0.5">SUPPORT</text>
  <text x="720" y="868" font-size="10" font-weight="500" fill="#525252" text-anchor="middle">Models · Scoring · Config</text>

  <!-- ================================================================ -->
  <!--  ❺ GRADING → REDIS (Publish Results)                             -->
  <!-- ================================================================ -->
  <path d="M 820 830 L 860 830 L 860 645 L 575 645" fill="none" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#a-async)"/>
  <text x="895" y="741" font-size="11" font-weight="600" fill="#b91c1c">❺  Publish Result</text>

  <!-- ================================================================ -->
  <!--  LEGEND                                                          -->
  <!-- ================================================================ -->
  <rect x="890" y="880" width="280" height="55" rx="4" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="908" y1="900" x2="948" y2="900" stroke="#404040" stroke-width="1.8" marker-end="url(#a-sync)"/>
  <text x="956" y="904" font-size="10" fill="#525252">Synchronous (HTTP, SQL)</text>
  <line x1="908" y1="920" x2="948" y2="920" stroke="#b91c1c" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#a-async)"/>
  <text x="956" y="924" font-size="10" fill="#525252">Asynchronous (Redis Streams)</text>

</svg>
